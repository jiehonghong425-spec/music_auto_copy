audiojungle:
  api_strategy: edge
  page_delay: 1.0
search:
  category: music
  sort: date
  date: this-year
  price_max: 19
  tags: []
  max_pages: 0
  max_items: 0
download:
  concurrency: 5
  output_dir: !!python/object/apply:pathlib.WindowsPath
  - ./downloads/previews
  overwrite: false
  verify_hash: true
  max_retries: 3
  retry_delay: 5.0
  presets:
    small:
      max_items: 20
      concurrency: 3
    medium:
      max_items: 100
      concurrency: 5
    large:
      max_items: 500
      concurrency: 8
separation:
  engine: local
  local:
    model: htdemucs
    device: auto
    two_stems: true
    jobs: 4
    model_dir: !!python/object/apply:pathlib.WindowsPath
    - ./models
    output_dir: !!python/object/apply:pathlib.WindowsPath
    - separated
progress:
  db_path: !!python/object/apply:pathlib.WindowsPath
  - ./progress.db
  resume: true
server:
  port: 8763
  host: 0.0.0.0
cookies:
  netease: ''
  qqmusic: ''
  kugou: ''
