<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>音乐处理平台</title>
<style>
:root{
  --bg:#0a0a0f; --surface:#12141d; --card:#181b26; --border:#252836;
  --text:#e4e6f0; --muted:#6b7088; --accent:#6366f1; --accent-hover:#818cf8;
  --green:#22c55e; --yellow:#eab308; --red:#ef4444; --radius:10px;
  --shadow:0 1px 3px rgba(0,0,0,.4);
}
*{box-sizing:border-box;margin:0;padding:0}
body{font:14px/1.6 system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--text);display:flex;min-height:100vh;letter-spacing:-0.01em}
/* Sidebar */
.sidebar{width:220px;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;padding:20px 12px;flex-shrink:0;gap:2px}
.sidebar .brand{display:flex;align-items:center;gap:10px;padding:0 8px 24px;font-size:15px;font-weight:700;color:var(--text)}
.sidebar .brand span{width:28px;height:28px;background:var(--accent);border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:14px}
.sidebar a{display:flex;align-items:center;gap:10px;padding:9px 10px;color:var(--muted);text-decoration:none;border-radius:7px;font-size:13px;transition:.15s;cursor:pointer}
.sidebar a:hover{color:var(--text);background:var(--card)}
.sidebar a.active{color:var(--text);background:var(--card);font-weight:500}
.sidebar .badge{margin-left:auto;background:var(--accent);color:#fff;font-size:10px;padding:1px 7px;border-radius:10px;min-width:20px;text-align:center}
.sidebar .footer{margin-top:auto;font-size:11px;color:var(--muted);padding:16px 10px 0}
/* Main */
.main{flex:1;overflow-y:auto;padding:32px 40px;max-width:1100px}
.page{display:none;animation:fade .2s}
.page.active{display:block}
@keyframes fade{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}
h2{font-size:20px;font-weight:600;margin-bottom:24px}
h3{font-size:13px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;margin:28px 0 12px}
/* Stat Cards */
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:28px}
.stat{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:18px 20px;transition:.2s}
.stat:hover{border-color:var(--accent)}
.stat .val{font-size:32px;font-weight:700;line-height:1}
.stat .lbl{font-size:12px;color:var(--muted);margin-top:6px}
.stat.accent .val{color:var(--accent)}
.stat.green .val{color:var(--green)}
.stat.yellow .val{color:var(--yellow)}
.stat.red .val{color:var(--red)}
/* Progress */
.progress-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:20px;margin-bottom:20px}
.progress-bar{height:6px;background:var(--border);border-radius:3px;overflow:hidden;margin:14px 0}
.progress-fill{height:100%;background:var(--accent);border-radius:3px;transition:width .4s ease}
.progress-meta{display:flex;justify-content:space-between;font-size:12px;color:var(--muted)}
.progress-meta strong{color:var(--text)}
/* Buttons */
.btn{display:inline-flex;align-items:center;gap:6px;padding:9px 18px;border:1px solid var(--border);border-radius:8px;background:var(--card);color:var(--text);cursor:pointer;font-size:13px;font-weight:500;transition:.15s;white-space:nowrap}
.btn:hover{background:#222634;border-color:#363b50}
.btn.p{background:var(--accent);border-color:var(--accent);color:#fff}
.btn.p:hover{background:var(--accent-hover)}
.btn.d{background:transparent;border-color:var(--red);color:var(--red)}
.btn.d:hover{background:var(--red);color:#fff}
.btn.sm{padding:5px 12px;font-size:12px;border-radius:6px}
.btn:disabled{opacity:.35;pointer-events:none}
.actions{display:flex;gap:8px;flex-wrap:wrap;margin:16px 0}
/* Form */
input,select{width:100%;padding:10px 14px;background:var(--surface);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:13px;outline:none;transition:.15s}
input:focus,select:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(99,102,241,.15)}
.form-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:12px;margin-bottom:14px}
.form-grp label{display:block;font-size:11px;color:var(--muted);margin-bottom:5px;font-weight:500;text-transform:uppercase;letter-spacing:.05em}
/* Table */
.table-wrap{overflow-x:auto;border:1px solid var(--border);border-radius:var(--radius)}
table{width:100%;border-collapse:collapse;font-size:13px}
th{text-align:left;padding:10px 16px;font-size:10px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;background:var(--surface);border-bottom:1px solid var(--border)}
td{padding:10px 16px;border-bottom:1px solid var(--border)}
tr:last-child td{border-bottom:none}
tr:hover td{background:rgba(255,255,255,.015)}
.tag{display:inline-block;padding:2px 10px;border-radius:12px;font-size:11px;font-weight:500}
.tag.ok{background:rgba(34,197,94,.12);color:var(--green)}
.tag.warn{background:rgba(234,179,8,.12);color:var(--yellow)}
.tag.err{background:rgba(239,68,68,.12);color:var(--red)}
.tag.info{background:rgba(99,102,241,.12);color:var(--accent)}
/* List item */
.list-item{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:12px 16px;margin-bottom:6px;display:flex;align-items:center;justify-content:space-between;gap:12px;transition:.15s}
.list-item:hover{border-color:#363b50}
.list-item .li-info{flex:1;min-width:0}
.list-item .li-title{font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.list-item .li-meta{font-size:11px;color:var(--muted);margin-top:2px}
/* Upload zone */
.drop{background:var(--card);border:2px dashed var(--border);border-radius:var(--radius);padding:56px;text-align:center;cursor:pointer;transition:.2s;margin-bottom:20px}
.drop:hover,.drop.drag{border-color:var(--accent);background:rgba(99,102,241,.04)}
.drop .drop-icon{font-size:36px;margin-bottom:12px;opacity:.6}
.drop p{color:var(--muted);font-size:13px}
.drop .hint{font-size:11px;color:var(--muted);margin-top:8px;opacity:.6}
/* Search */
.search-bar{position:relative;max-width:480px;margin-bottom:20px}
.search-bar svg{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--muted)}
.search-bar input{padding-left:38px}
/* Toast */
.toasts{position:fixed;top:20px;right:20px;z-index:999;display:flex;flex-direction:column;gap:8px}
.toast{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:12px 18px;font-size:13px;animation:in .25s;max-width:360px;box-shadow:0 8px 24px rgba(0,0,0,.5)}
.toast.ok{border-color:var(--green)}
.toast.er{border-color:var(--red)}
@keyframes in{from{opacity:0;transform:translateX(16px)}to{opacity:1;transform:translateX(0)}}
/* Modal */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:99;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(4px)}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:24px;min-width:380px;max-width:500px;box-shadow:0 20px 60px rgba(0,0,0,.6)}
.modal h3{font-size:16px;margin:0 0 20px;color:var(--text);text-transform:none;letter-spacing:normal}
/* Slider */
.slider{display:flex;align-items:center;gap:12px}
.slider input[type=range]{flex:1}
.slider span{min-width:32px;text-align:center;font-weight:600;font-size:14px}
/* Empty state */
.empty{padding:40px;text-align:center;color:var(--muted);font-size:13px;border:1px dashed var(--border);border-radius:var(--radius)}
/* Tabs */
.tab{background:none;border:none;color:var(--muted);padding:10px 20px;font-size:13px;cursor:pointer;border-bottom:2px solid transparent;transition:.15s;display:flex;align-items:center;gap:6px}
.tab:hover{color:var(--text)}
.tab.active{color:var(--text);border-bottom-color:var(--accent)}
.tab .ct{background:var(--border);padding:1px 8px;border-radius:10px;font-size:11px;min-width:20px;text-align:center}
.tab.active .ct{background:var(--accent);color:#fff}
/* Source link */
.src{font-family:monospace;font-size:11px;color:var(--muted);background:var(--surface);padding:2px 8px;border-radius:4px;word-break:break-all}
</style>
</head>
<body>

<aside class="sidebar">
  <div class="brand"><span>🎵</span> 音乐处理</div>
  <a data-page="dashboard" class="active" onclick="nav('dashboard')">📊 仪表盘</a>
  <a data-page="sources" onclick="nav('sources')">🔍 音频搜索</a>
  <a data-page="files" onclick="nav('files')">📁 文件管理</a>
  <a data-page="upload" onclick="nav('upload')">📤 上传</a>
  <a data-page="settings" onclick="nav('settings')">⚙️ 设置</a>
  <div class="footer">v2.1 · 20 首已分离</div>
</aside>

<div class="toasts" id="toasts"></div>

<main class="main">

<!-- ═══════════════ DASHBOARD ═══════════════ -->
<div id="page-dashboard" class="page active">
  <h2>仪表盘</h2>
  <!-- Tab 切换 -->
  <div class="tabs" style="display:flex;gap:0;margin-bottom:20px;border-bottom:1px solid var(--border)">
    <button class="tab active" onclick="switchTab('pending')" data-tab="pending">🔵 待处理 <span class="ct" id="s-pending">0</span></button>
    <button class="tab" onclick="switchTab('downloaded')" data-tab="downloaded">🟡 已下载 <span class="ct" id="s-downloaded">0</span></button>
    <button class="tab" onclick="switchTab('separated')" data-tab="separated">🟢 已分离 <span class="ct" id="s-separated">0</span></button>
    <button class="tab" onclick="switchTab('failed')" data-tab="failed">🔴 失败 <span class="ct" id="s-failed">0</span></button>
  </div>

  <!-- 分离进度条 -->
  <div class="progress-card" style="margin-bottom:16px">
    <div style="display:flex;justify-content:space-between;align-items:center">
      <span id="p-status" style="font-size:13px">⚪ 空闲</span>
      <span id="p-eta" style="font-size:12px;color:var(--muted)"></span>
    </div>
    <div class="progress-bar"><div class="progress-fill" id="p-bar" style="width:0%"></div></div>
    <div class="progress-meta"><span id="p-title">等待任务</span><span id="p-count">0/0</span></div>
  </div>

  <!-- 分离控制 -->
  <div class="actions">
    <select id="sep-model" style="width:auto"><option value="htdemucs">htdemucs (快)</option><option value="htdemucs_ft">htdemucs_ft (高质量)</option></select>
    <select id="sep-jobs" style="width:auto"><option value="1">1 线程</option><option value="2">2 线程</option><option value="4" selected>4 线程</option><option value="8">8 线程</option></select>
    <button class="btn p" onclick="startSeparation()">▶ 开始分离</button>
    <button class="btn d" onclick="stopSeparation()">⏹ 停止</button>
  </div>

  <!-- 列表区 -->
  <h3 id="tab-title" style="margin-top:24px">待处理</h3>
  <div class="actions" id="tab-actions"></div>
  <div id="tab-list"><div class="empty">加载中...</div></div>
</div>

<!-- ═══════════════ SOURCES ═══════════════ -->
<div id="page-sources" class="page">
  <h2>音频搜索</h2>
  <div class="form-row">
    <div class="form-grp">
      <label>站点</label>
      <select id="search-site" onchange="onSiteChange()"></select>
    </div>
    <div class="form-grp">
      <label>关键词</label>
      <input id="search-keyword" placeholder="歌曲名 / 歌手名" onkeydown="if(event.key==='Enter')searchAudio()">
    </div>
  </div>
  <div class="form-row" id="aj-params">
    <div class="form-grp"><label>最高价格 $</label><input id="search-price" type="number" value="19"></div>
    <div class="form-grp"><label>数量</label><input id="search-max" type="number" value="20"></div>
    <div class="form-grp"><label>标签</label><input id="search-tags" placeholder="corporate, inspiring"></div>
    <div class="form-grp"><label>排序</label><select id="search-sort"><option value="date">日期</option><option value="sales">销量</option><option value="rating">评分</option><option value="price">价格</option></select></div>
  </div>
  <div class="actions">
    <button class="btn p" onclick="searchAudio()">🔍 搜索</button>
    <button class="btn" onclick="addAllToQueue()" id="btn-add-all" style="display:none">+ 全部加入队列</button>
  </div>
  <div id="search-results"></div>

  <h3>站点管理</h3>
  <div class="actions">
    <button class="btn" onclick="showAddSite()">+ 添加站点</button>
  </div>
  <div class="table-wrap"><table><thead><tr><th>名称</th><th>URL</th><th>类型</th><th>操作</th></tr></thead><tbody id="sites-tbody"></tbody></table></div>
</div>

<!-- ═══════════════ FILES ═══════════════ -->
<div id="page-files" class="page">
  <h2>文件管理</h2>
  <div class="actions">
    <select id="file-filter" onchange="loadFiles()" style="width:auto">
      <option value="">全部</option><option value="downloaded">已下载</option><option value="separated">已分离</option><option value="failed">失败</option>
    </select>
    <button class="btn" onclick="loadFiles()">🔄 刷新</button>
  </div>
  <div class="table-wrap"><table><thead><tr><th>标题</th><th>作者</th><th>状态</th><th>操作</th></tr></thead><tbody id="files-tbody"></tbody></table></div>
</div>

<!-- ═══════════════ UPLOAD ═══════════════ -->
<div id="page-upload" class="page">
  <h2>上传文件</h2>
  <div class="drop" id="drop-zone" onclick="document.getElementById('file-input').click()">
    <div class="drop-icon">📤</div>
    <p>点击或拖拽文件到此处</p>
    <div class="hint">mp3 · wav · flac · ogg · m4a · aac | mp4 · avi · mov · mkv · webm（视频自动提取音频）</div>
  </div>
  <input type="file" id="file-input" multiple hidden accept="audio/*,video/*" onchange="uploadFiles(this.files)">
  <div class="actions"><button class="btn p" onclick="document.getElementById('file-input').click()">选择文件</button></div>
  <div id="upload-results"></div>
</div>

<!-- ═══════════════ SETTINGS ═══════════════ -->
<div id="page-settings" class="page">
  <h2>设置</h2>
  <div class="form-row">
    <div class="form-grp"><label>模型</label><select id="cfg-model"><option value="htdemucs">htdemucs (快)</option><option value="htdemucs_ft">htdemucs_ft (高质量)</option></select></div>
    <div class="form-grp"><label>并行线程</label><div class="slider"><input type="range" id="cfg-jobs" min="1" max="8" value="4" oninput="this.nextElementSibling.textContent=this.value"><span>4</span></div></div>
    <div class="form-grp"><label>下载并发</label><input id="cfg-concurrency" type="number" value="5"></div>
    <div class="form-grp"><label>设备</label><select id="cfg-device"><option value="auto">自动</option><option value="cpu">CPU</option><option value="cuda">CUDA</option></select></div>
  </div>
  <div class="form-grp"><label>输出目录</label><input id="cfg-output" value="./separated"></div>
  <button class="btn p" onclick="saveSettings()">💾 保存</button>

  <h3>VIP Cookie（可选，填后可下载完整歌曲）</h3>
  <p style="font-size:11px;color:var(--muted);margin-bottom:12px">浏览器 F12 → Application → Cookies，复制对应值</p>
  <div class="form-row">
    <div class="form-grp"><label>网易云 MUSIC_U</label><input id="cfg-cookie-netease" placeholder="粘贴 Cookie"></div>
    <div class="form-grp"><label>QQ音乐 uin</label><input id="cfg-cookie-qqmusic" placeholder="粘贴 Cookie"></div>
    <div class="form-grp"><label>酷狗 kg_mid</label><input id="cfg-cookie-kugou" placeholder="粘贴 Cookie"></div>
  </div>
  <button class="btn p" onclick="saveSettings()">💾 保存 Cookie</button>
</div>

</main>

<!-- Add Site Modal -->
<div class="modal-overlay" id="modal-overlay" style="display:none" onclick="if(event.target===this)closeModal()">
  <div class="modal">
    <h3>添加站点</h3>
    <div class="form-grp" style="margin-bottom:12px"><label>名称</label><input id="site-name" placeholder="网易云音乐"></div>
    <div class="form-grp" style="margin-bottom:12px"><label>URL</label><input id="site-url" placeholder="https://music.163.com"></div>
    <div class="form-grp" style="margin-bottom:16px"><label>类型</label><select id="site-type"><option value="netease">网易云音乐</option><option value="qqmusic">QQ音乐</option><option value="kugou">酷狗</option><option value="audiojungle">AudioJungle</option></select></div>
    <div class="actions" style="justify-content:flex-end"><button class="btn" onclick="closeModal()">取消</button><button class="btn p" onclick="addSite()">确定</button></div>
  </div>
</div>

<script>
const API='/api';

// ── Navigation ──────────────────────────────
function nav(p){
  document.querySelectorAll('.page').forEach(e=>e.classList.remove('active'));
  document.querySelectorAll('.sidebar a').forEach(a=>a.classList.remove('active'));
  document.getElementById('page-'+p).classList.add('active');
  document.querySelector(`[data-page="${p}"]`).classList.add('active');
  p==='dashboard'&&(refreshDashboard(),loadTabItems());
  p==='sources'&&loadSites();
  p==='files'&&loadFiles();
}

// ── Toast ───────────────────────────────────
function toast(m,t='ok'){const e=document.createElement('div');e.className='toast '+t;e.textContent=m;document.getElementById('toasts').appendChild(e);setTimeout(()=>{e.style.opacity='0';setTimeout(()=>e.remove(),300)},2800)}

// ── API helper ──────────────────────────────
async function api(m,u,b){
  const o={method:m,headers:{}};
  if(b){o.headers['Content-Type']='application/json';o.body=JSON.stringify(b)}
  const r=await fetch(API+u,o);if(!r.ok){const t=await r.text();throw new Error(t)}return r.json()
}

// ── Dashboard ───────────────────────────────
async function refreshDashboard(){
  try{const p=await api('GET','/progress');['pending','downloaded','separated','failed'].forEach(s=>{const e=document.getElementById('s-'+s);if(e)e.textContent=p.stats[s]||0});const t=p.total||1;document.getElementById('p-bar').style.width=(p.completed/t*100)+'%';document.getElementById('p-title').textContent=p.title||'等待任务';document.getElementById('p-count').textContent=p.completed+'/'+p.total;document.getElementById('p-eta').textContent=p.eta_seconds?`剩余 ~${Math.round(p.eta_seconds/60)}min`:'';document.getElementById('p-status').innerHTML=p.running?'🟢 运行中':'⚪ 空闲'}catch(e){}
}
setInterval(refreshDashboard,3000);refreshDashboard();

const evt=new EventSource(API+'/progress/stream');
evt.onmessage=function(e){try{const p=JSON.parse(e.data);['pending','downloaded','separated','failed'].forEach(s=>{const el=document.getElementById('s-'+s);if(el&&p.stats)el.textContent=p.stats[s]||0});document.getElementById('p-bar').style.width=(p.total?(p.completed/p.total*100):0)+'%';document.getElementById('p-title').textContent=p.title||'空闲';document.getElementById('p-count').textContent=p.completed+'/'+p.total;document.getElementById('p-eta').textContent=p.eta_seconds?`剩余 ~${Math.round(p.eta_seconds/60)}min`:'';document.getElementById('p-status').innerHTML=p.running?'🟢 运行中':'⚪ 空闲'}catch(e){}};

async function startSeparation(){
  try{const r=await api('POST','/separate',{model:document.getElementById('sep-model').value,jobs:parseInt(document.getElementById('sep-jobs').value)});toast('已启动 '+r.total+' 首');refreshDashboard()}catch(e){toast(e.message,'er')}
}
async function stopSeparation(){try{await api('POST','/separate/stop');toast('已停止')}catch(e){toast(e.message,'er')}}

// ── Tab System ─────────────────────────────
let currentTab='pending';
function switchTab(t){
  currentTab=t;
  document.querySelectorAll('.tab').forEach(b=>b.classList.remove('active'));
  document.querySelector(`[data-tab="${t}"]`).classList.add('active');
  loadTabItems();
}
const TAB_LABELS={pending:'待处理',downloaded:'已下载',separated:'已分离',failed:'失败'};
const TAB_ICONS={pending:'🔵',downloaded:'🟡',separated:'🟢',failed:'🔴'};

async function loadTabItems(){
  const t=currentTab;
  document.getElementById('tab-title').textContent=TAB_ICONS[t]+' '+TAB_LABELS[t];
  const div=document.getElementById('tab-list');
  const acts=document.getElementById('tab-actions');
  div.innerHTML='<div class="empty">加载中...</div>';
  acts.innerHTML='';

  try{
    const r=await api('GET','/files?status='+t+'&limit=200');
    // Update stat counts
    ['pending','downloaded','separated','failed'].forEach(s=>{
      const el=document.getElementById('s-'+s);
      if(el)el.textContent=r.stats[s]||0;
    });

    if(!r.items.length){
      div.innerHTML=`<div class="empty">暂无${TAB_LABELS[t]}的音频</div>`;
    }else{
      div.innerHTML=r.items.map(i=>{
        const src=(()=>{try{return JSON.parse(i.tags||'{}').source||''}catch(e){return''}})();
        const dlPath=i.download_path||'';
        const inst=i.instrumental_path||'';
        const voc=i.vocals_path||'';
        let meta=[];
        if(i.author)meta.push(i.author);
        if(src)meta.push('来源: '+src);
        if(dlPath)meta.push('<span class="src">源: '+dlPath+'</span>');
        if(inst)meta.push('<span class="src">伴奏: '+inst+'</span>');
        if(voc)meta.push('<span class="src">人声: '+voc+'</span>');
        if(i.error_message)meta.push('❌ '+i.error_message);
        return `<div class="list-item"><div class="li-info"><div class="li-title">${i.title||'(无标题)'}</div><div class="li-meta">${meta.join(' · ')}</div></div>${tabActions(i)}</div>`;
      }).join('');
    }

    // 各 tab 的操作按钮
    if(t==='pending'){
      acts.innerHTML=`<button class="btn p" onclick="downloadQueue()">📥 下载全部</button><button class="btn d" onclick="clearQueue()">清空队列</button>`;
    }else if(t==='downloaded'){
      acts.innerHTML=`<button class="btn p" onclick="startSeparation()">🎵 全部分离</button>`;
    }else if(t==='failed'){
      acts.innerHTML=`<button class="btn" onclick="retryFailed()">🔄 重试全部</button>`;
    }
  }catch(e){div.innerHTML='<div class="empty">加载失败</div>'}
}

function tabActions(i){
  const t=currentTab;
  if(t==='pending'){
    return `<div style="display:flex;gap:6px"><button class="btn sm p" onclick="downloadSingle(${i.id})">下载</button><button class="btn sm d" onclick="removeFromQueue(${i.id})">移除</button></div>`;
  }else if(t==='downloaded'){
    return `<button class="btn sm p" onclick="startSepOne(${i.id})">分离</button>`;
  }else if(t==='separated'){
    let btns='';
    if(i.instrumental_path)btns+=`<a href="${API}/files/${i.id}/download?stem=instrumental" class="btn sm" download>COPY 伴奏</a> `;
    if(i.vocals_path)btns+=`<a href="${API}/files/${i.id}/download?stem=vocals" class="btn sm" download>COPY 人声</a>`;
    return btns||'—';
  }else if(t==='failed'){
    return `<button class="btn sm" onclick="startSepOne(${i.id})">🔄 重试</button>`;
  }
  return '';
}

// ── Queue (wrappers) ───────────────────────
async function addToQueue(id,title,author,url,source){
  try{const r=await api('POST','/queue/add',{items:[{id,title,author,preview_url:url,source,source_id:id}]});toast('已加入');if(currentTab==='pending')loadTabItems()}catch(e){toast(e.message,'er')}
}
async function removeFromQueue(id){try{await api('DELETE','/queue/'+id);loadTabItems()}catch(e){}}
async function downloadQueue(){
  try{const q=await api('GET','/queue');if(!q.count)return toast('队列为空','er');const r=await api('POST','/download',{item_ids:q.items.map(i=>i.id)});toast('已下载 '+r.downloaded+' 首');loadTabItems()}catch(e){toast(e.message,'er')}
}
async function clearQueue(){
  if(!confirm('清空待处理队列？'))return;const q=await api('GET','/queue');for(const i of q.items)await api('DELETE','/queue/'+i.id).catch(()=>{});loadTabItems()
}
async function retryFailed(){
  const r=await api('GET','/files?status=failed&limit=200');
  if(!r.items.length)return toast('没有失败项');
  await api('POST','/separate',{item_ids:r.items.map(i=>i.id)});toast('已重试');loadTabItems()
}

async function downloadSingle(id){
  try{await api('POST','/download',{item_ids:[id]});toast('已下载');loadTabItems()}catch(e){toast(e.message,'er')}
}

// Update refresh function
const origRefresh=refreshDashboard;
refreshDashboard=function(){
  // Update stat counts via SSE already handled
  if(currentTab)loadTabItems();
};

// ── Sites & Search ──────────────────────────
let searchResults=[],currentSiteType='audiojungle';

async function loadSites(){
  try{const sites=await api('GET','/sites');const tb=document.getElementById('sites-tbody'),sel=document.getElementById('search-site');tb.innerHTML='';sel.innerHTML='';
  sites.forEach(s=>{tb.innerHTML+=`<tr><td>${s.name}</td><td style="max-width:300px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${s.url}</td><td><span class="tag info">${s.scraper_type}</span></td><td><button class="btn sm d" onclick="deleteSite(${s.id})">删除</button></td></tr>`;sel.innerHTML+=`<option value="${s.id}" data-type="${s.scraper_type}">${s.name}</option>`});
  onSiteChange()}catch(e){}
}
function onSiteChange(){
  const s=document.getElementById('search-site'),o=s.options[s.selectedIndex];currentSiteType=o?.dataset?.type||'audiojungle';
  const cn=currentSiteType!=='audiojungle';document.getElementById('aj-params').style.display=cn?'none':'grid';
}
async function searchAudio(){
  const d=document.getElementById('search-results');d.innerHTML='<p style="color:var(--muted);padding:20px 0">搜索中...</p>';
  try{const kw=document.getElementById('search-keyword').value||(currentSiteType!=='audiojungle'?'热门':'');
  const b={site_id:parseInt(document.getElementById('search-site').value),price_max:parseInt(document.getElementById('search-price').value)||19,sort:document.getElementById('search-sort').value,max_items:parseInt(document.getElementById('search-max').value)||0};
  b.tags=currentSiteType!=='audiojungle'?kw:document.getElementById('search-tags').value;
  const r=await api('POST','/search',b);searchResults=r.items;document.getElementById('btn-add-all').style.display=r.count?'inline-flex':'none';
  if(!r.count){d.innerHTML='<div class="empty">无结果，换个关键词试试</div>';return}
  d.innerHTML='<h3>'+r.count+' 个结果</h3>';
  r.items.forEach(item=>{
    const can=item.can_download!==false,dur=item.duration?' · '+item.duration+'s':'';
    const t=item.title.replace(/'/g,"\\'"),a=(item.author||'').replace(/'/g,"\\'"),u=item.preview_url||'',src=item.source||'';
    const btn=can?`<button class="btn sm p" onclick="addToQueue('${item.id}','${t}','${a}','${u}','${src}')">+ 加入队列</button>`:`<button class="btn sm" disabled>🔒 需VIP</button>`;
    d.innerHTML+=`<div class="list-item"><div class="li-info"><div class="li-title">${item.title} <span class="tag ${can?'ok':'warn'}" style="font-size:10px">${item.dl_note||(can?'可下载':'需VIP')}</span></div><div class="li-meta">${item.author||''} · ${item.source||''} · ${item.album||''}${dur}</div></div>${btn}</div>`;
  })}catch(e){d.innerHTML='<div class="empty">搜索失败: '+e.message+'</div>'}
}
async function addAllToQueue(){
  if(!searchResults.length)return toast('请先搜索','er');
  const items=searchResults.map(i=>({id:i.id,title:i.title,author:i.author||'',preview_url:i.preview_url||'',source:i.source||'',source_id:i.id}));
  const r=await api('POST','/queue/add',{items});toast('已加入 '+r.added+' 首');loadQueue()
}
function showAddSite(){document.getElementById('modal-overlay').style.display='flex'}
function closeModal(){document.getElementById('modal-overlay').style.display='none'}
async function addSite(){
  try{await api('POST','/sites',{name:document.getElementById('site-name').value,url:document.getElementById('site-url').value,scraper_type:document.getElementById('site-type').value});closeModal();loadSites();toast('站点已添加')}catch(e){toast(e.message,'er')}
}
async function deleteSite(id){if(!confirm('删除此站点？'))return;try{await api('DELETE','/sites/'+id);loadSites()}catch(e){}}

// ── Files ───────────────────────────────────
async function loadFiles(){
  try{const f=document.getElementById('file-filter')?.value||'';const r=await api('GET','/files?status='+f);
  document.getElementById('files-tbody').innerHTML=r.items.map(i=>{
    let btns='';
    if(i.instrumental_path)btns+=`<a href="${API}/files/${i.id}/download?stem=instrumental" class="btn sm" download>COPY 伴奏</a> `;
    if(i.vocals_path)btns+=`<a href="${API}/files/${i.id}/download?stem=vocals" class="btn sm" download>COPY 人声</a> `;
    if(i.download_path)btns+=`<a href="${API}/files/${i.id}/download?stem=download" class="btn sm" download>COPY 源文件</a>`;
    const st=i.status,sc=st==='separated'?'ok':st==='downloaded'?'info':st==='failed'?'err':'warn';
    return`<tr><td>${(i.title||'').substring(0,60)}</td><td>${i.author||''}</td><td><span class="tag ${sc}">${st}</span></td><td style="display:flex;gap:6px">${btns||'—'}</td></tr>`;
  }).join('')}catch(e){}
}
async function copyPath(id,stem){
  try{const r=await api('POST','/files/'+id+'/copy?stem='+stem);await navigator.clipboard.writeText(r.path);toast('已复制路径')}catch(e){try{const r=await api('POST','/files/'+id+'/copy?stem='+stem);prompt('路径 (Ctrl+C):',r.path)}catch(e2){}}
}

// ── Upload ──────────────────────────────────
const dz=document.getElementById('drop-zone');
if(dz){dz.addEventListener('dragover',e=>{e.preventDefault();dz.classList.add('drag')});dz.addEventListener('dragleave',()=>dz.classList.remove('drag'));dz.addEventListener('drop',e=>{e.preventDefault();dz.classList.remove('drag');uploadFiles(e.dataTransfer.files)})}
async function uploadFiles(files){
  if(!files.length)return;const fd=new FormData();for(const f of files)fd.append('files',f);
  try{const r=await fetch(API+'/upload',{method:'POST',body:fd});const d=await r.json();const div=document.getElementById('upload-results');
  div.innerHTML='<h3>上传结果</h3>'+d.results.map(r=>`<div class="list-item"><div class="li-info"><div class="li-title">${r.name}</div><div class="li-meta">${r.ok?`✅ ${(r.size/1e6).toFixed(1)}MB · ${r.type} · 已加入待处理队列`:'❌ '+r.error}</div></div></div>`).join('');
  toast('上传 '+d.results.filter(r=>r.ok).length+'/'+d.count)}catch(e){toast('上传失败','er')}
}
async function startSepOne(id){try{await api('POST','/separate',{item_ids:[id]});toast('已开始分离')}catch(e){toast(e.message,'er')}}

// ── Settings ────────────────────────────────
async function saveSettings(){
  try{await api('PUT','/config',{model:document.getElementById('cfg-model').value,jobs:parseInt(document.getElementById('cfg-jobs').value),concurrency:parseInt(document.getElementById('cfg-concurrency').value),device:document.getElementById('cfg-device').value,output_dir:document.getElementById('cfg-output').value});
  await fetch(API+'/cookies',{method:'POST',headers:{'Content-Type':'application/x-www-form-urlencoded'},body:`netease=${encodeURIComponent(document.getElementById('cfg-cookie-netease').value)}&qqmusic=${encodeURIComponent(document.getElementById('cfg-cookie-qqmusic').value)}&kugou=${encodeURIComponent(document.getElementById('cfg-cookie-kugou').value)}`});
  toast('已保存')}catch(e){toast(e.message,'er')}
}
async function loadSettings(){
  try{const c=await api('GET','/config');
  document.getElementById('cfg-model').value=c.model||'htdemucs';document.getElementById('sep-model').value=c.model||'htdemucs';
  document.getElementById('cfg-jobs').value=c.jobs||4;document.getElementById('cfg-jobs').nextElementSibling.textContent=c.jobs||4;
  document.getElementById('sep-jobs').value=c.jobs||4;document.getElementById('cfg-concurrency').value=c.concurrency||5;
  document.getElementById('cfg-device').value=c.device||'auto';document.getElementById('cfg-output').value=c.output_dir||'./separated';
  if(c.cookies){['netease','qqmusic','kugou'].forEach(k=>{const el=document.getElementById('cfg-cookie-'+k);if(el&&c.cookies[k])el.placeholder=c.cookies[k]})}
  }catch(e){}
}
loadSettings();
</script>
